name: CI

on:
  push:
    branches: [main]
  pull_request:

# Opt JS actions onto Node.js 24 ahead of GitHub's June 2026 forced flip.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  syntax:
    name: Syntax + import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Headless Qt + virtual X server. mouseinfo (pulled in by
          # pyautogui at import time) reads $DISPLAY unconditionally,
          # so we need a real display for `import pyautogui` to succeed.
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 libxkbcommon0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libdbus-1-3

      - name: Compile (syntax)
        run: python -m py_compile "NexusTyper Pro.py"

      - name: Import smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a python -c "
          import importlib.util
          spec = importlib.util.spec_from_file_location('nt_app', 'NexusTyper Pro.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          print('OK: module loads')
          "
