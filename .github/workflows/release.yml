name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS .app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller "NexusTyper Pro.spec"

      - name: Zip the bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "NexusTyper Pro.app" "NexusTyper Pro-macOS.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusTyper-Pro-macOS
          path: dist/NexusTyper Pro-macOS.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexusTyper Pro-macOS.zip
          generate_release_notes: true

  windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe
        run: |
          pyinstaller --windowed --name "NexusTyper Pro" `
            --add-data "ico2.png;." `
            --add-data "icon.icns;." `
            "NexusTyper Pro.py"

      - name: Zip the bundle
        run: Compress-Archive -Path "dist/NexusTyper Pro/*" -DestinationPath "dist/NexusTyper Pro-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusTyper-Pro-Windows
          path: dist/NexusTyper Pro-Windows.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NexusTyper Pro-Windows.zip
          generate_release_notes: true
