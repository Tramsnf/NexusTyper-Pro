name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger so you can test the build pipeline without cutting a real
  # release. Tag-pushed runs attach to a GitHub Release; manual runs just
  # publish the build artifacts on the workflow run page.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS .app + .dmg
    runs-on: macos-latest
    # Signing secrets bound at job level so step-level `if: env.X != ''`
    # gates can see them. The signing/notarization steps fall through
    # gracefully when the corresponding secret is unset, producing an
    # ad-hoc-signed unsigned-installer build.
    env:
      APPLE_APPLICATION_CERT_BASE64: ${{ secrets.APPLE_APPLICATION_CERT_BASE64 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
      NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
      NOTARIZE_APPLE_PASSWORD: ${{ secrets.NOTARIZE_APPLE_PASSWORD }}
      NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compute version
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
            IFS='.' read -ra P <<< "$VERSION"
            while [[ ${#P[@]} -lt 4 ]]; do P+=(0); done
            NUMERIC="${P[0]}.${P[1]}.${P[2]}.${P[3]}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
            NUMERIC="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NUMERIC=$NUMERIC" >> "$GITHUB_ENV"
          # Bake the tag version into the source so the bundle's
          # CFBundleShortVersionString / About dialog / Diagnostics readout
          # all match the GitHub release tag, even if a maintainer forgot
          # to bump constants.py. The .bak suffix keeps sed portable
          # across BSD (macOS) and GNU (Linux/Git-Bash on Windows).
          sed -i.bak -E "s/^APP_VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]/APP_VERSION = \"$VERSION\"/" nexustyper/constants.py
          rm -f nexustyper/constants.py.bak
          grep '^APP_VERSION' nexustyper/constants.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: pyinstaller "NexusTyper Pro.spec"

      # Sign with Developer ID Application if the cert is available, else
      # fall back to ad-hoc signing. Ad-hoc keeps the kernel happy on Apple
      # Silicon (no "damaged" error) but doesn't satisfy Gatekeeper — that
      # only goes away with a real Developer ID + notarization.
      - name: Import Developer ID Application cert
        if: env.APPLE_APPLICATION_CERT_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | xargs)
          echo "$APPLE_APPLICATION_CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/app.p12"
          security import "$RUNNER_TEMP/app.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "BUILD_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          rm "$RUNNER_TEMP/app.p12"

      - name: Sign the .app
        run: |
          if [[ -n "$APPLE_DEVELOPER_ID_APPLICATION" ]]; then
            echo "Signing with: $APPLE_DEVELOPER_ID_APPLICATION"
            codesign --force --deep --options runtime --timestamp \
              --sign "$APPLE_DEVELOPER_ID_APPLICATION" \
              "dist/NexusTyper Pro.app"
          else
            echo "No Developer ID — falling back to ad-hoc signing"
            codesign --force --deep --sign - "dist/NexusTyper Pro.app"
          fi
          codesign --verify --deep --strict --verbose=2 "dist/NexusTyper Pro.app" || true

      - name: Notarize the .app
        if: env.NOTARIZE_APPLE_ID != '' && env.APPLE_DEVELOPER_ID_APPLICATION != ''
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/NexusTyper Pro.app" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_APPLE_PASSWORD" \
            --team-id  "$NOTARIZE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/NexusTyper Pro.app"

      - name: Zip the bundle
        working-directory: dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "NexusTyper Pro.app" \
            "NexusTyper-Pro-macOS.zip"

      - name: Build .dmg
        run: |
          ./installers/macos/build-dmg.sh \
            "dist/NexusTyper Pro.app" \
            "$VERSION" \
            "dist/NexusTyper-Pro-macOS.dmg"

      - uses: actions/upload-artifact@v7
        with:
          name: NexusTyper-Pro-macOS
          path: |
            dist/*.zip
            dist/*.dmg

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.zip
            dist/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false

  windows:
    name: Build Windows .exe + Setup
    runs-on: windows-latest
    env:
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compute version
        shell: bash
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
            IFS='.' read -ra P <<< "$VERSION"
            while [[ ${#P[@]} -lt 4 ]]; do P+=(0); done
            NUMERIC="${P[0]}.${P[1]}.${P[2]}.${P[3]}"
          else
            VERSION="0.0.0-dev.${GITHUB_RUN_NUMBER}"
            NUMERIC="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_NUMERIC=$NUMERIC" >> "$GITHUB_ENV"
          # Bake the tag version into the source so the bundle's
          # CFBundleShortVersionString / About dialog / Diagnostics readout
          # all match the GitHub release tag, even if a maintainer forgot
          # to bump constants.py. The .bak suffix keeps sed portable
          # across BSD (macOS) and GNU (Linux/Git-Bash on Windows).
          sed -i.bak -E "s/^APP_VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]/APP_VERSION = \"$VERSION\"/" nexustyper/constants.py
          rm -f nexustyper/constants.py.bak
          grep '^APP_VERSION' nexustyper/constants.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Convert .icns to .ico for the Windows build
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icon.iconset/icon_256x256.png')
          img.save('icon.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(48,48),(32,32),(16,16)])
          "

      - name: Build .exe
        run: |
          pyinstaller --noconfirm --windowed --clean `
            --name "NexusTyper Pro" `
            --icon icon.ico `
            --add-data "ico2.png;." `
            --add-data "ico.png;." `
            --collect-data certifi `
            --hidden-import PyQt5.QtSvg `
            --collect-submodules nexustyper `
            "NexusTyper Pro.py"

      # If a code-signing PFX is available, decode it and sign the .exe with
      # signtool BEFORE packaging it into the installer — that way the
      # installed binary is signed too. Setup.exe gets signed separately
      # below.
      - name: Decode signing cert
        if: env.WINDOWS_PFX_BASE64 != ''
        shell: bash
        run: |
          echo "$WINDOWS_PFX_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.pfx"
          echo "WINDOWS_PFX_PATH=$RUNNER_TEMP/cert.pfx" >> "$GITHUB_ENV"

      - name: Sign .exe
        if: env.WINDOWS_PFX_PATH != ''
        run: |
          $signtool = (Resolve-Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object -Descending | Select-Object -First 1).Path
          & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
            /f "$env:WINDOWS_PFX_PATH" /p "$env:WINDOWS_PFX_PASSWORD" `
            "dist\NexusTyper Pro\NexusTyper Pro.exe"

      - name: Zip the bundle
        run: |
          $zip = "dist/NexusTyper-Pro-Windows.zip"
          Compress-Archive -Path "dist/NexusTyper Pro/*" -DestinationPath $zip

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Setup.exe
        # Run in PowerShell (not bash) — Git Bash's MSYS layer mangles
        # arguments that start with /D, breaking ISCC's /D<NAME>=<VALUE>
        # preprocessor switches.
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DMyAppVersion=$env:VERSION" `
            "/DMyAppVersionNumeric=$env:VERSION_NUMERIC" `
            "installers\windows\NexusTyper-Pro.iss"

      - name: Sign Setup.exe
        if: env.WINDOWS_PFX_PATH != ''
        run: |
          $signtool = (Resolve-Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object -Descending | Select-Object -First 1).Path
          Get-ChildItem dist\*-Setup.exe | ForEach-Object {
            & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 `
              /f "$env:WINDOWS_PFX_PATH" /p "$env:WINDOWS_PFX_PASSWORD" `
              $_.FullName
          }

      - uses: actions/upload-artifact@v7
        with:
          name: NexusTyper-Pro-Windows
          path: |
            dist/*.zip
            dist/*-Setup.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.zip
            dist/*-Setup.exe
          generate_release_notes: true
          draft: false
          prerelease: false

  linux:
    name: Build Linux binary + .deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Compute version
        run: |
          REF="${GITHUB_REF_NAME}"
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
          else
            VERSION="0.0.0~dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Bake the tag version into the source so the in-app About /
          # Diagnostics readout matches the GitHub release tag.
          sed -i -E "s/^APP_VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]/APP_VERSION = \"$VERSION\"/" nexustyper/constants.py
          grep '^APP_VERSION' nexustyper/constants.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # Runtime libs PyInstaller needs to bundle so the binary launches
          # on a typical Ubuntu/X11 desktop.
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libegl1 libxkbcommon0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 libdbus-1-3

      - name: Build binary
        run: |
          xvfb-run -a pyinstaller --noconfirm --windowed --clean \
            --name "NexusTyper-Pro" \
            --add-data "ico2.png:." \
            --add-data "ico.png:." \
            --collect-data certifi \
            --hidden-import PyQt5.QtSvg \
            --collect-submodules nexustyper \
            "NexusTyper Pro.py"

      - name: Tarball
        run: |
          cd dist
          tar -czf "NexusTyper-Pro-Linux.tar.gz" "NexusTyper-Pro"

      - name: Build .deb
        run: |
          ./installers/linux/build-deb.sh \
            "dist/NexusTyper-Pro" \
            "$VERSION" \
            "icon.iconset/icon_256x256.png" \
            "dist/nexustyper-pro_amd64.deb"

      - uses: actions/upload-artifact@v7
        with:
          name: NexusTyper-Pro-Linux
          path: |
            dist/*.tar.gz
            dist/*.deb

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false

  bump-source-version:
    # After a successful tag-driven release, open a PR against main that
    # rewrites nexustyper/constants.py with the just-released version.
    # The release workflow already rewrites the constant *for the build*,
    # but the source on disk in `main` is never touched — so without this
    # job, anyone running from source between releases sees a stale
    # APP_VERSION until a human remembers to bump it. The PR sits there
    # until the maintainer merges it, so a broken release tag (which we'd
    # want to skip) doesn't auto-poison main.
    name: Open auto-bump PR for source APP_VERSION
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Compute version from tag
        run: |
          REF="${GITHUB_REF_NAME}"
          VERSION="${REF#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Bump source and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # In-place bump matching the build-time sed in the platform jobs.
          sed -i -E \
            "s/^APP_VERSION[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]/APP_VERSION = \"$VERSION\"/" \
            nexustyper/constants.py

          if git diff --quiet nexustyper/constants.py; then
            echo "Source already at $VERSION; nothing to bump."
            exit 0
          fi

          # Standard GitHub Actions bot identity for automated commits.
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/bump-source-$VERSION"
          # If a previous failed run left this branch around, blow it away
          # and recreate so the PR points at clean state.
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add nexustyper/constants.py
          git commit -m "Bump source APP_VERSION to $VERSION"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Bump source APP_VERSION to $VERSION" \
            --body $'Auto-opened after the v'"$VERSION"$' release shipped.\n\nKeeps `nexustyper/constants.py` in sync with the latest tag so dev runs from source show the correct version. Safe to squash-merge.'
